<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAPILY SALON</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #000; color: #fff; }
        .gold-text { color: #d4af37; }
        .bg-card { background-color: #111; border: 1px solid #333; }
        input, select { background-color: #1a1a1a !important; border: 1px solid #333 !important; color: #fff !important; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; }
        .service-item { padding: 12px; background-color: #111; border: 1px solid #333; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.3s; }
        .service-item.active { background-color: #d4af37; color: #000; font-weight: bold; }
        .admin-section { display: none; }
    </style>
</head>
<body class="p-4">
    <div id="bookingPage" class="max-w-md mx-auto">
        <h2 onclick="showLogin()" class="text-3xl font-black text-center gold-text mb-6 mt-4 cursor-pointer">كابيلي</h2>

        <input type="text" id="custName" placeholder="الاسم">
        <input type="tel" id="custPhone" placeholder="الموبايل">
        <div class="flex gap-2">
            <input type="date" id="bookDate" value="2026-05-15">
            <input type="time" id="bookTime">
        </div>

        <p class="gold-text font-bold mt-4 mb-2">اختر الحلاق:</p>
        <div class="grid grid-cols-3 gap-2 mb-4">
            <button onclick="setB('أشرف', '01119576866')" class="b-btn bg-card p-3 rounded-lg border border-transparent">أشرف</button>
            <button onclick="setB('حماده', '01128375682')" class="b-btn bg-card p-3 rounded-lg border border-transparent">حماده</button>
            <button onclick="setB('يوسف', '01229818899')" class="b-btn bg-card p-3 rounded-lg border border-transparent">يوسف</button>
        </div>

        <p class="gold-text font-bold mb-2">اختر الخدمات:</p>
        <div class="grid grid-cols-2 gap-2 mb-6" id="servicesGrid">
            <div class="service-item" onclick="selS(this, 'قص شعر', 150)">قص شعر <br> <span class="text-xs">150 ج (25 د)</span></div>
            <div class="service-item" onclick="selS(this, 'حلاقة ذقن', 100)">حلاقة ذقن <br> <span class="text-xs">100 ج (15 د)</span></div>
            <div class="service-item" onclick="selS(this, 'استشوار', 70)">استشوار <br> <span class="text-xs">70 ج (15 د)</span></div>
            <div class="service-item" onclick="selS(this, 'قص أطفال', 100)">قص أطفال <br> <span class="text-xs">100 ج (20 د)</span></div>
            <div class="service-item" onclick="selS(this, 'تمليس', 150)">تمليس <br> <span class="text-xs">150 ج (30 د)</span></div>
            <div class="service-item" onclick="selS(this, 'بروتين', 500)">بروتين <br> <span class="text-xs">500 ج (90 د)</span></div>
            <div class="service-item" onclick="selS(this, 'باكدج عريس', 1000)">باكدج عريس <br> <span class="text-xs">1000 ج (120 د)</span></div>
            <div class="service-item" onclick="selS(this, 'واكس', 150)">واكس <br> <span class="text-xs">150 ج (15 د)</span></div>
            <div class="service-item" onclick="selS(this, 'تنظيف بشرة', 250)">تنظيف بشرة <br> <span class="text-xs">250 ج (20 د)</span></div>
        </div>

        <button onclick="finish()" class="w-full bg-white text-black font-bold py-4 rounded-xl text-lg shadow-lg">تأكيد الحجز وفتح واتساب</button>
    </div>

    <div id="adminPage" class="admin-section max-w-md mx-auto text-center">
        <h2 class="text-2xl font-bold gold-text mb-6">لوحة الإدارة</h2>
        <div class="bg-card p-4 rounded-xl space-y-4">
            <p>أهلاً بك يا محمد! هنا يمكنك رؤية الحجوزات قريباً.</p>
            <button onclick="hideAdmin()" class="w-full bg-red-600 p-3 rounded-lg font-bold">خروج</button>
        </div>
    </div>

    <script>
        let services = [];
        let barberName = "";
        let barberPhone = "";

        function setB(n, p) {
            barberName = n; barberPhone = p;
            document.querySelectorAll('.b-btn').forEach(b => b.style.borderColor = 'transparent');
            event.currentTarget.style.borderColor = '#d4af37';
        }

        function selS(el, name, price) {
            el.classList.toggle('active');
            if(services.includes(name)) services = services.filter(s => s !== name);
            else services.push(name);
        }

        function finish() {
            const name = document.getElementById('custName').value;
            const time = document.getElementById('bookTime').value;
            const date = document.getElementById('bookDate').value;
            if(!name || !barberPhone || services.length === 0 || !time) return alert("كمل بياناتك واختار الحلاق والوقت");
            
            const msg = `حجز جديد من الموقع:%0Aالاسم: ${name}%0Aالحلاق: ${barberName}%0Aالتاريخ: ${date}%0Aالموعد: ${time}%0Aالخدمات: ${services.join(' + ')}`;
            window.open(`https://wa.me/2${barberPhone}?text=${msg}`);
        }

        function showLogin() {
            let pass = prompt("دخل كلمة سر الإدارة:");
            if(pass === "mohamed111997") {
                document.getElementById('bookingPage').style.display = 'none';
                document.getElementById('adminPage').style.display = 'block';
            }
        }
        function hideAdmin() {
            document.getElementById('adminPage').style.display = 'none';
            document.getElementById('bookingPage').style.display = 'block';
        }
    </script>
</body>
</html>
