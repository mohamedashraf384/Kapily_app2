<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAPILY SALON</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #000; color: #fff; direction: rtl; }
        .gold-text { color: #d4af37; }
        .gold-border { border: 1px solid #d4af37; }
        .bg-card { background-color: #1a1a1a; border: 1px solid #333; }
        input, select { background-color: #111 !important; border: 1px solid #333 !important; color: #fff !important; width: 100%; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .service-item { padding: 10px; background-color: #1a1a1a; border: 1px solid #333; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.3s; }
        .service-item.active { background-color: #d4af37; color: #000; font-weight: bold; }
    </style>
</head>
<body class="p-4 min-h-screen">
    <div class="max-w-md mx-auto">
        <h2 class="text-3xl font-black text-center gold-text mb-6 mt-4">كابيلي</h2>

        <div class="space-y-2">
            <input type="text" id="custName" placeholder="الاسم">
            <input type="tel" id="custPhone" placeholder="الموبايل">
            
            <div class="flex gap-2">
                <input type="date" id="bookDate" value="2026-05-15">
                <select id="barberList">
                    <option value="أشرف">أشرف</option>
                    <option value="حماده">حماده</option>
                    <option value="يوسف">يوسف</option>
                </select>
            </div>
            <input type="time" id="bookTime">
        </div>

        <p class="gold-text font-bold mt-4 mb-2">اختر الحلاق:</p>
        <div class="flex gap-2 mb-4">
            <button onclick="selectB('أشرف')" class="flex-1 bg-card p-2 rounded-lg hover:border-yellow-500 border border-transparent">أشرف</button>
            <button onclick="selectB('حماده')" class="flex-1 bg-card p-2 rounded-lg hover:border-yellow-500 border border-transparent">حماده</button>
            <button onclick="selectB('يوسف')" class="flex-1 bg-card p-2 rounded-lg hover:border-yellow-500 border border-transparent">يوسف</button>
        </div>

        <p class="gold-text font-bold mb-2">اختر الخدمات:</p>
        <div class="grid grid-cols-2 gap-2 mb-6">
            <div class="service-item" onclick="selS(this, 'قص شعر', 150)">قص شعر <br> <span class="text-xs opacity-70">150 ج</span></div>
            <div class="service-item" onclick="selS(this, 'حلاقة ذقن', 100)">حلاقة ذقن <br> <span class="text-xs opacity-70">100 ج</span></div>
            <div class="service-item" onclick="selS(this, 'استشوار', 70)">استشوار <br> <span class="text-xs opacity-70">70 ج</span></div>
            <div class="service-item" onclick="selS(this, 'قص أطفال', 100)">قص أطفال <br> <span class="text-xs opacity-70">100 ج</span></div>
            <div class="service-item" onclick="selS(this, 'تمليس', 150)">تمليس <br> <span class="text-xs opacity-70">150 ج</span></div>
            <div class="service-item" onclick="selS(this, 'بروتين', 500)">بروتين <br> <span class="text-xs opacity-70">500 ج</span></div>
            <div class="service-item" onclick="selS(this, 'باكدج عريس', 1000)">باكدج عريس <br> <span class="text-xs opacity-70">1000 ج</span></div>
            <div class="service-item" onclick="selS(this, 'تنظيف بشرة', 250)">تنظيف بشرة <br> <span class="text-xs opacity-70">250 ج</span></div>
        </div>

        <button onclick="finish()" class="w-full bg-white text-black font-bold py-4 rounded-xl text-lg shadow-lg hover:bg-gray-200 transition-all">
            تأكيد الحجز وفتح واتساب
        </button>

        <div class="mt-10">
            <h4 class="gold-text text-center mb-4">جدول المواعيد المحجوزة</h4>
            <div class="bg-card rounded-xl p-4 text-center text-gray-500 border border-zinc-800">
                لا توجد حجوزات حالياً
            </div>
        </div>
    </div>

    <script>
        let services = [];
        function selectB(name) { document.getElementById('barberList').value = name; }
        function selS(el, name, price) {
            el.classList.toggle('active');
            if(services.includes(name)) { services = services.filter(s => s !== name); }
            else { services.push(name); }
        }
        function finish() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const barber = document.getElementById('barberList').value;
            const time = document.getElementById('bookTime').value;
            const date = document.getElementById('bookDate').value;
            if(!name || !time || services.length === 0) return alert("كمل بياناتك يا هندسة");
            
            const msg = `حجز جديد من الموقع:%0Aالاسم: ${name}%0Aالموبايل: ${phone}%0Aالحلاق: ${barber}%0Aالتاريخ: ${date}%0Aالساعة: ${time}%0Aالخدمات: ${services.join(' + ')}`;
            window.open(`https://wa.me/201017056037?text=${msg}`);
        }
    </script>
</body>
</html>
