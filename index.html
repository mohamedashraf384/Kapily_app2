<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAPILY SALON</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0a0a0a; color: white; }
        .gold-text { color: #d4af37; }
        .gold-bg { background-color: #d4af37; color: black; }
        .card { background-color: #1a1a1a; border: 1px solid #333; border-radius: 15px; }
        input, select { background-color: #222 !important; border: 1px solid #444 !important; color: white !important; }
        .service-btn { border: 1px solid #444; transition: 0.3s; }
        .service-btn.active { border-color: #d4af37; background-color: rgba(212, 175, 55, 0.1); }
    </style>
</head>
<body class="p-5">
    <div class="max-w-md mx-auto">
        <header class="text-center py-8">
            <h1 class="text-4xl font-black gold-text italic tracking-tighter">KAPILY SALON</h1>
            <div class="h-1 w-20 bg-yellow-600 mx-auto mt-2"></div>
        </header>

        <div class="card p-6 space-y-6">
            <div>
                <label class="block mb-2 font-bold">الاسم</label>
                <input type="text" id="userName" class="w-full p-3 rounded-lg" placeholder="اكتب اسمك هنا">
            </div>
            
            <div>
                <label class="block mb-2 font-bold">الموبايل</label>
                <input type="tel" id="userPhone" class="w-full p-3 rounded-lg" placeholder="رقم الواتساب">
            </div>

            <div>
                <label class="block mb-2 font-bold gold-text">اختر الحلاق:</label>
                <select id="barber" class="w-full p-3 rounded-lg">
                    <option value="أشرف">أشرف</option>
                    <option value="حماده">حماده</option>
                    <option value="يوسف">يوسف</option>
                </select>
            </div>

            <div>
                <label class="block mb-2 font-bold gold-text">اختر الخدمات:</label>
                <div class="grid grid-cols-2 gap-3" id="servicesGrid">
                    <button onclick="toggleService(this, 'قص شعر', 150)" class="service-btn p-3 rounded-lg text-sm text-center">
                        قص شعر <br> <span class="text-gray-400">150 ج</span>
                    </button>
                    <button onclick="toggleService(this, 'حلاقة ذقن', 100)" class="service-btn p-3 rounded-lg text-sm text-center">
                        حلاقة ذقن <br> <span class="text-gray-400">100 ج</span>
                    </button>
                    <button onclick="toggleService(this, 'استشوار', 70)" class="service-btn p-3 rounded-lg text-sm text-center">
                        استشوار <br> <span class="text-gray-400">70 ج</span>
                    </button>
                    <button onclick="toggleService(this, 'بروتين', 500)" class="service-btn p-3 rounded-lg text-sm text-center">
                        بروتين <br> <span class="text-gray-400">500 ج</span>
                    </button>
                </div>
            </div>

            <button onclick="sendBooking()" class="w-full gold-bg font-bold py-4 rounded-xl shadow-lg mt-4">
                تأكيد الحجز وفتح واتساب
            </button>
        </div>
    </div>

    <script>
        let selectedServices = [];

        function toggleService(btn, name, price) {
            btn.classList.toggle('active');
            const index = selectedServices.indexOf(name);
            if (index > -1) {
                selectedServices.splice(index, 1);
            } else {
                selectedServices.push(name);
            }
        }

        function sendBooking() {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const barber = document.getElementById('barber').value;
            
            if (!name || !phone || selectedServices.length === 0) {
                alert('من فضلك كمل بياناتك واختار خدمة واحدة على الأقل');
                return;
            }

            const message = `حجز جديد من الموقع:%0Aالاسم: ${name}%0Aالموبايل: ${phone}%0Aالحلاق: ${barber}%0Aالخدمات: ${selectedServices.join(' - ')}`;
            window.open(`https://wa.me/201017056037?text=${message}`);
        }
    </script>
</body>
</html>
