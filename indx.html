<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAPILY SALON</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: black; color: white; }
        .step { display: none; }
        .active { display: block; }
    </style>
</head>
<body>
    <div class="min-h-screen p-5">
        <header class="text-center py-8">
            <h1 class="text-4xl font-black text-yellow-500 tracking-tighter">KAPILY SALON</h1>
            <div class="h-1 w-20 bg-yellow-600 mx-auto mt-2 rounded-full"></div>
        </header>

        <div class="max-w-md mx-auto bg-zinc-900 p-6 rounded-3xl border border-zinc-800 shadow-2xl">
            <div id="step1" class="step active">
                <h2 class="text-xl font-bold mb-6 border-r-4 border-yellow-500 pr-3 text-right">اختار الحلاق:</h2>
                <div class="grid gap-4">
                    <button onclick="toStep2('أشرف', '201119576866')" class="bg-zinc-800 p-5 rounded-2xl text-right hover:bg-yellow-600 hover:text-black font-bold transition-all">أشرف</button>
                    <button onclick="toStep2('حماده', '201128375682')" class="bg-zinc-800 p-5 rounded-2xl text-right hover:bg-yellow-600 hover:text-black font-bold transition-all">حماده</button>
                    <button onclick="toStep2('يوسف', '201229818899')" class="bg-zinc-800 p-5 rounded-2xl text-right hover:bg-yellow-600 hover:text-black font-bold transition-all">يوسف</button>
                </div>
            </div>

            <div id="step2" class="step">
                <button onclick="toStep1()" class="text-zinc-500 text-sm mb-4">← رجوع</button>
                <h2 class="text-xl font-bold mb-6 border-r-4 border-yellow-500 pr-3 text-right">اختار الخدمة:</h2>
                <div class="grid gap-3">
                    <button onclick="toStep3('حلاقة شعر', 100)" class="bg-zinc-800 p-5 rounded-2xl text-right flex justify-between hover:border-yellow-500 border border-transparent"><span>حلاقة شعر</span><span class="text-yellow-500 font-bold">100 ج</span></button>
                    <button onclick="toStep3('حلاقة ذقن', 50)" class="bg-zinc-800 p-5 rounded-2xl text-right flex justify-between hover:border-yellow-500 border border-transparent"><span>حلاقة ذقن</span><span class="text-yellow-500 font-bold">50 ج</span></button>
                    <button onclick="toStep3('شعر وذقن', 140)" class="bg-zinc-800 p-5 rounded-2xl text-right flex justify-between hover:border-yellow-500 border border-transparent"><span>شعر وذقن</span><span class="text-yellow-500 font-bold">140 ج</span></button>
                </div>
            </div>

            <div id="step3" class="step">
                <button onclick="toStep2()" class="text-zinc-500 text-sm mb-4">← رجوع</button>
                <h2 class="text-xl font-bold mb-6 border-r-4 border-yellow-500 pr-3 text-right">بيانات الحجز:</h2>
                <input type="text" id="custName" placeholder="اسمك" class="w-full bg-zinc-800 p-4 rounded-xl mb-4 outline-none border border-zinc-700 text-right">
                <select id="custTime" class="w-full bg-zinc-800 p-4 rounded-xl mb-4 outline-none border border-zinc-700 text-right">
                    <option value="">اختار الوقت</option>
                    <option>12:00 PM</option><option>02:00 PM</option><option>04:00 PM</option><option>06:00 PM</option><option>08:00 PM</option><option>10:00 PM</option>
                </select>
                <button onclick="book()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-xl text-lg shadow-lg">تأكيد عبر واتساب 📱</button>
            </div>
        </div>

        <div class="text-center mt-12 pb-10">
            <button onclick="adminLogin()" class="text-zinc-800 text-sm underline">لوحة الإدارة</button>
        </div>
    </div>

    <script>
        let selectedBarber = ""; let barberPhone = ""; let selectedService = ""; let servicePrice = "";
        function toStep1() { hideAll(); document.getElementById('step1').classList.add('active'); }
        function toStep2(name, phone) { if(name){selectedBarber=name; barberPhone=phone;} hideAll(); document.getElementById('step2').classList.add('active'); }
        function toStep3(s, p) { if(s){selectedService=s; servicePrice=p;} hideAll(); document.getElementById('step3').classList.add('active'); }
        function hideAll() { document.querySelectorAll('.step').forEach(s => s.classList.remove('active')); }
        function book() {
            const name = document.getElementById('custName').value;
            const time = document.getElementById('custTime').value;
            if(!name || !time) return alert("اكمل البيانات");
            const msg = `*حجز جديد من الموقع*%0a*الاسم:* ${name}%0a*الحلاق:* ${selectedBarber}%0a*الخدمة:* ${selectedService}%0a*الموعد:* ${time}%0a*السعر:* ${servicePrice}ج`;
            window.open(`https://wa.me/${barberPhone}?text=${msg}`);
        }
        function adminLogin() {
            const pass = prompt("كلمة السر:");
            if(pass === "mohamed111997") alert("أهلاً يا مدير!");
            else alert("خطأ!");
        }
    </script>
</body>
</html>
